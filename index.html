<!doctype html>
<html>
  <head>
    <title>South Bay Sports Venues</title>
    <meta name="description" content="A Catalog of the Best Sports Venues in the South Bay (That I have been to)!!!" />
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="scripts.js"></script>
  </head>

  <body>
    <header class="header">
      <div class = "header-circle"></div>
      <div class = "header-circle-2"></div>
      <div class="header-top">A Personal Catalogue of Places I've actually been</div>
  
      <h1 class="header-title">
        Sports<br><span>Venues</span>
      </h1>
    
      <div class="header-corner">
        <p>venues reviewed</p>
        <strong id="header-count">6</strong>
      </div>
    </header>
    
    <nav class="toolbar">
      <button class="filter-btn" id = "reset-filter">All Venues</button>
      <button class="filter-btn" id = "golf-filter">Golf</button>
      <button class="filter-btn" id = "tennis-filter">Tennis</button>
      <div class="toolbar-right">
        <select class="sort-select" id="sort-select">
          <option value="default" id = reset-filter>Default order</option>
          <option value="rating-desc" id = "sort-by-descending">Rating ↓</option>
          <option value="rating-asc" id = "sort-by-ascending">Rating ↑</option>
          <option value="name" id = "sort-by-alphabetical">A → Z</option>
        </select>
      </div>
    </nav>

    <div id="card-container">
      
    </div>

    <!-- template div for card, this is filled dynamically on webpage load by scripts -->
    <div class="card" style="display: none" value="" onclick="">
      <img class = "image-container" src="" alt="Venue Main Image" />
      <div class="card-content">
        <h2 class = "venue-name">Venue Name</h2>
        <p class= "venue-information"></p>
        <div class = "venue-rating"></div>

      </div>
    </div>
    
    <div class="footer">
      
    </div>
  </body>
</html>
